name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run shellcheck on guardrail scripts and tests (strict)
        run: |
          shellcheck --version
          shellcheck scripts/*.sh tests/*.sh gemini/scripts/*.sh
      - name: Run shellcheck on installer (errors only)
        run: shellcheck --severity=error install.sh

  guardrail-tests:
    name: guardrail tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run guardrail test harness (with jq + python3 present)
        run: ./tests/guardrails.test.sh
      - name: Run guardrail test harness (jq removed — exercises fallback)
        run: |
          sudo rm -f "$(command -v jq)" || true
          ./tests/guardrails.test.sh

  manifest-validation:
    name: plugin & marketplace manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate JSON manifests parse
        run: |
          for f in \
            .claude-plugin/plugin.json .claude-plugin/marketplace.json \
            .cursor-plugin/plugin.json .cursor-plugin/marketplace.json \
            gemini/gemini-extension.json gemini/hooks/hooks.json \
            hooks/hooks.json; do
            echo "validating $f"
            jq empty "$f"
          done
      - name: Required manifest fields present (Claude + Cursor)
        run: |
          for m in .claude-plugin .cursor-plugin; do
            jq -e '.name and .version and .description' "$m/plugin.json" >/dev/null
            jq -e '.name and .owner and (.plugins | length > 0)' "$m/marketplace.json" >/dev/null
          done
          echo "manifest fields OK"
      - name: Claude & Cursor manifests stay in sync
        run: |
          for key in '.name' '.version'; do
            c=$(jq -r "$key" .claude-plugin/plugin.json)
            u=$(jq -r "$key" .cursor-plugin/plugin.json)
            [ "$c" = "$u" ] || { echo "::error::plugin.json $key differs: claude=$c cursor=$u"; exit 1; }
          done
          v=$(jq -r '.version' .claude-plugin/plugin.json)
          [ "$v" = "$(tr -d '[:space:]' < VERSION)" ] || { echo "::error::VERSION ($(cat VERSION)) != plugin.json version ($v)"; exit 1; }
          g=$(jq -r '.version' gemini/gemini-extension.json)
          [ "$g" = "$v" ] || { echo "::error::gemini-extension.json version ($g) != $v"; exit 1; }
          echo "versions in sync: $v"

  agent-frontmatter:
    name: agent & command frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Every agent declares name + description
        run: |
          fail=0
          for f in agents/*.md; do
            head -n 1 "$f" | grep -qx -- '---' || { echo "::error file=$f::missing opening frontmatter"; fail=1; }
            grep -qE '^name:' "$f"        || { echo "::error file=$f::missing 'name:'"; fail=1; }
            grep -qE '^description:' "$f" || { echo "::error file=$f::missing 'description:'"; fail=1; }
          done
          for f in commands/*.md; do
            grep -qE '^description:' "$f" || { echo "::error file=$f::missing 'description:'"; fail=1; }
          done
          for f in skills/*/SKILL.md; do
            head -n 1 "$f" | grep -qx -- '---' || { echo "::error file=$f::missing opening frontmatter"; fail=1; }
            grep -qE '^name:' "$f"        || { echo "::error file=$f::missing 'name:'"; fail=1; }
            grep -qE '^description:' "$f" || { echo "::error file=$f::missing 'description:'"; fail=1; }
          done
          exit $fail

  gemini-extension:
    name: gemini extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Required gemini manifest fields present
        run: jq -e '.name and .version and .description and .contextFileName' gemini/gemini-extension.json >/dev/null
      - name: All gemini command TOML parse and define a prompt
        run: python3 -c "import tomllib,glob; assert all('prompt' in tomllib.load(open(f,'rb')) for f in glob.glob('gemini/commands/*.toml')); print('gemini command TOML OK')"
      - name: Gemini agent frontmatter + read-only reviewers carry no write tools
        run: |
          fail=0
          for f in gemini/agents/*.md; do
            head -n 1 "$f" | grep -qx -- '---' || { echo "::error file=$f::missing frontmatter"; fail=1; }
            grep -qE '^name:' "$f"  || { echo "::error file=$f::missing 'name:'"; fail=1; }
            grep -qE '^tools:' "$f" || { echo "::error file=$f::missing 'tools:'"; fail=1; }
          done
          for a in tech-lead security-engineer performance-engineer; do
            if grep -qE '^  - (write_file|replace)$' "gemini/agents/$a.md"; then
              echo "::error::$a is read-only but lists a write tool"; fail=1
            fi
          done
          exit $fail
      - name: gemini/ is in sync with the generator
        run: |
          python3 scripts/build-gemini-extension.py
          git diff --exit-code -- gemini/ || { echo "::error::gemini/ is stale — run: python3 scripts/build-gemini-extension.py and commit"; exit 1; }
